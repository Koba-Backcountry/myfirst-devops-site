name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: SSH to EC2 and deploy
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ ! -d "/home/ubuntu/MyFirstDevOps" ]; then
              git clone https://github.com/Koba-Backcountry/myfirst-devops-site.git
            fi
            cd MyFirstDevOps
            git pull
            docker build -t myfirstdevops-site .
            docker rm -f myfirstdevops-container || true
            docker run -d -p 80:80 --name myfirstdevops-container myfirstdevops-site
